# NOTE: this repo is nested inside a larger monorepo. All `files:` patterns
# below are scoped to this project's subfolder (and are matched relative to
# the git repository root) so that committing changes elsewhere in the
# monorepo does not trigger these hooks.
repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
        files: ^CLEAN_CODE_TESTING_GIT/resilient-data-importer/(src|tests)/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^CLEAN_CODE_TESTING_GIT/resilient-data-importer/(src|tests)/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: []
        args: [--config-file=CLEAN_CODE_TESTING_GIT/resilient-data-importer/pyproject.toml]
        files: ^CLEAN_CODE_TESTING_GIT/resilient-data-importer/src/
